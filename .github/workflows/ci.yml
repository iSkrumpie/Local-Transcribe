name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & type-check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.x"

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Install backend + dev deps
        working-directory: backend
        run: |
          uv venv --python 3.11 ../.venv-ci
          uv pip install --python ../.venv-ci/bin/python -r requirements.txt -r requirements-dev.txt

      - name: ruff
        working-directory: backend
        run: ../.venv-ci/bin/python -m ruff check app/

      - name: mypy
        working-directory: backend
        run: ../.venv-ci/bin/python -m mypy app/
        continue-on-error: true  # mypy on mlx_whisper / faster_whisper will have missing imports; informational

  smoke-import:
    name: Smoke-test app import (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.x"

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Install backend deps (faster-whisper only — no Apple-Silicon models in CI)
        working-directory: backend
        run: |
          uv venv --python 3.11 ../.venv-ci
          uv pip install --python ../.venv-ci/bin/python -r requirements.txt

      - name: Verify app imports + backend selection works
        working-directory: backend
        env:
          WHISPER_BACKEND: fw
        run: |
          ../.venv-ci/bin/python -c "import app.main; print('app.main import OK')"
          ../.venv-ci/bin/python -c "from app.transcriber import select_backend; from app.backends.fw_backend import FasterWhisperBackend; b=FasterWhisperBackend(model='tiny'); print('fw-backend init OK:', b.model_name)"
